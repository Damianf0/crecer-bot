services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/login"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - clinica-net

  warmup:
    image: curlimages/curl:latest
    restart: on-failure
    depends_on:
      nginx:
        condition: service_started
    command: >
      sh -c "sleep 3 &&
             curl -sf http://nginx/login -o /dev/null &&
             curl -sf http://nginx/login -o /dev/null &&
             echo '[warmup] OPcache calentado'"
    networks:
      - clinica-net

  web:
    build: ./docker/php
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      # Acceso de lectura al directorio de media del bot, para indexar archivos
      # entrantes en el legajo de cada paciente sin transferir bytes via HTTP.
      - ./bot/media:/bot-media:ro
      # Backups + logs de tareas Windows programadas — read-only para que el
      # dashboard /admin pueda mostrar el estado de los respaldos diarios.
      - ./backups:/backups:ro
    depends_on:
      - mysql
    environment:
      - TZ=America/Argentina/Buenos_Aires
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 8s
    networks:
      - clinica-net

  # Servidor WebSocket para broadcasts en tiempo real (Laravel Reverb).
  # Lo usa el chat interno (React) para evitar polling cada 6s. Misma imagen
  # que web pero corre el server WebSocket en puerto 8080. Expone al host
  # para que el browser pueda conectarse directo via ws://192.168.1.125:8080.
  reverb:
    build: ./docker/php
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      - TZ=America/Argentina/Buenos_Aires
    command: ["sh", "-c", "sleep 6 && php artisan reverb:start --host=0.0.0.0 --port=8080"]
    labels:
      - autoheal=true
    healthcheck:
      # nc no está en la imagen php → daba falso "unhealthy". fsockopen prueba
      # el puerto 8080 con el PHP que ya está en el container.
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1',8080)?0:1);\""]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - clinica-net

  # Worker dedicado a la queue 'resumen' (jobs LLM asincrónicos).
  # Comparte la imagen y el código del web pero corre artisan queue:work.
  # Aislado del PHP-FPM para que las llamadas largas a Ollama no afecten respuestas HTTP.
  # user: www-data para que los archivos de log que cree (rotación daily de Monolog)
  # queden writable para el web — si los crea root, el web tira 500 al loggear.
  queue-worker:
    build: ./docker/php
    restart: unless-stopped
    user: "www-data"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mysql
    environment:
      - TZ=America/Argentina/Buenos_Aires
    command: ["sh", "-c", "sleep 8 && php artisan queue:work --queue=resumen --tries=2 --timeout=120 --sleep=5 --max-time=3600"]
    networks:
      - clinica-net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --binlog-expire-logs-seconds=259200
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD requerido — copiar .env.example a .env y completar}
      MYSQL_DATABASE: ${DB_DATABASE:-clinica}
      MYSQL_USER: ${DB_USERNAME:-crecer}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido — copiar .env.example a .env y completar}
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - mysql-data:/var/lib/mysql
    # Puerto 3306 NO publicado al host: la DB queda accesible solo desde la red docker.
    # Acceso administrativo: docker exec crecer-mysql-1 mysql -u${DB_USERNAME} -p${DB_PASSWORD} clinica
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - clinica-net

  # Bot WhatsApp — área ATENCIÓN (el original). Cada área es un contenedor con
  # su propia sesión de WhatsApp (volumen wa-session-*) y su propio puerto. El
  # código de ./bot es el mismo para los 3; se diferencian por las variables
  # BOT_AREA / PORT / BOT_PUBLIC_URL (acá, NO en bot/.env que es compartido).
  bot:
    build: ./docker/node
    restart: unless-stopped
    volumes:
      - ./bot:/app
      - wa-session:/app/.wwebjs_auth                  # sesión WhatsApp (wwebjs)
    ports:
      - "3001:3001"
    depends_on:
      - web
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_AREA=atencion
      - PORT=3001
      - BOT_PUBLIC_URL=http://192.168.1.125:3001
      # Migrado a Baileys 2026-05-19. ROLLBACK temporal 2026-05-20: tras un
      # ciclo de wsl --shutdown + restarts, la sesion Baileys quedo en estado
      # phantom — `listo` reportando OK pero el server WA no enruta mensajes
      # nuevos (silencio total). MessageCounterError + Stream Errored (ack).
      # Reset + reescaneo no destrabo. Igual que ovo, volvemos a wwebjs hasta
      # que se aclare el bug. Sesion wwebjs preservada en volumen wa-session.
      # - BOT_WA_CLIENT=baileys
    labels:
      - autoheal=true
    healthcheck:
      # Mira el contenido de /status, no solo HTTP 200 — detecta el estado
      # "zombie" donde el endpoint responde pero el cliente WA no escucha.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/status 2>/dev/null | grep -q '\"status\":\"listo\"'"]
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 300s
    networks:
      - clinica-net

  # Bot WhatsApp — área ADMINISTRACIÓN
  bot-administracion:
    build: ./docker/node
    restart: unless-stopped
    volumes:
      - ./bot:/app
      - wa-session-administracion:/app/.wwebjs_auth         # sesión WhatsApp (wwebjs)
    ports:
      - "3002:3002"
    depends_on:
      - web
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_AREA=administracion
      - PORT=3002
      - BOT_PUBLIC_URL=http://192.168.1.125:3002
      # Migrado a Baileys 2026-05-19. Vuelto a wwebjs 2026-06-16 — decisión: salir
      # de Baileys del todo (era la raíz del cruce de sesión y de la inestabilidad).
      # - BOT_WA_CLIENT=baileys
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/status 2>/dev/null | grep -q '\"status\":\"listo\"'"]
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 300s
    networks:
      - clinica-net

  # Bot WhatsApp — área OVODONACIÓN
  bot-ovodonacion:
    build: ./docker/node
    restart: unless-stopped
    volumes:
      - ./bot:/app
      - wa-session-ovodonacion:/app/.wwebjs_auth       # sesión WhatsApp (wwebjs)
    ports:
      - "3003:3003"
    depends_on:
      - web
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_AREA=ovodonacion
      - PORT=3003
      - BOT_PUBLIC_URL=http://192.168.1.125:3003
      # Migrado a Baileys 2026-05-19, rollback 2026-05-20 por "Esperando mensaje...".
      # Reintentado 2026-05-29 con el fix del message store (commit 6bceaa5), pero
      # el bug NO era del getMessage: era identity key stale del lado del receptor
      # tras re-pareo del bot. Mi fix no aplica (el cliente del receptor no manda
      # retry porque la sesion esta rota end-to-end). Rollback otra vez a wwebjs.
      # - BOT_WA_CLIENT=baileys
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/status 2>/dev/null | grep -q '\"status\":\"listo\"'"]
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 300s
    networks:
      - clinica-net

  # Bot WhatsApp — SHADOW de testing (Baileys). DESACTIVADO 2026-06-16 al salir
  # de Baileys. Queda detrás del profile "baileys" para no arrancar con
  # `docker compose up -d`. Para reactivarlo: `docker compose --profile baileys up -d`.
  bot-test:
    profiles: ["baileys"]
    build: ./docker/node
    restart: unless-stopped
    volumes:
      - ./bot:/app
      - wa-baileys-test:/app/.baileys_auth
    ports:
      - "3009:3009"
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_AREA=test
      - PORT=3009
      - BOT_PUBLIC_URL=http://192.168.1.125:3009
      - BOT_WA_CLIENT=baileys
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3009/status 2>/dev/null | grep -qE '\"status\":\"(listo|esperando_qr)\"'"]
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 60s
    networks:
      - clinica-net

  # Watchdog EXTERNO de containers. El watchdog interno de cada bot vive en el
  # mismo proceso Node: si el event loop se congela (cuelgue CDP/Chromium), se
  # congela con él y no puede recuperar. Peor: restart=unless-stopped NO actúa
  # sobre estado `unhealthy` — solo reinicia containers que SALEN con error, no
  # vivos-pero-trabados. Resultado real: el bot de administración quedó frozen
  # 10 días (16/06→26/06) sin que nada lo levantara. autoheal cierra ese hueco:
  # reinicia cualquier container con label `autoheal=true` que esté unhealthy.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - AUTOHEAL_CONTAINER_LABEL=autoheal   # solo toca containers con label autoheal=true
      - AUTOHEAL_INTERVAL=15                 # revisa cada 15s
      - AUTOHEAL_START_PERIOD=300            # gracia inicial (los bots tardan en parear)
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=20     # margen para cerrar Chromium antes del kill
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - clinica-net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      - ASR_MODEL=small
      - ASR_ENGINE=faster_whisper
      - ASR_LANG=es
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/docs', timeout=2)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - clinica-net

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - clinica-net

volumes:
  mysql-data:
  ollama-data:
  wa-session:                  # sesión WhatsApp del bot de ATENCIÓN (wwebjs)
  wa-session-administracion:   # sesión WhatsApp del bot de ADMINISTRACIÓN (wwebjs)
  wa-session-ovodonacion:      # sesión WhatsApp del bot de OVODONACIÓN (wwebjs)
  wa-baileys-test:             # sesión del bot SHADOW (Baileys) — sólo si se activa profile "baileys"

networks:
  clinica-net:
